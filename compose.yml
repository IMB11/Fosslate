services:
  app:
    build:
      context: .
    environment:
      DATABASE_URL: postgres://fosslate:fosslate@postgres:5432/fosslate
      NODE_ENV: production
      PORT: "3000"
      API_HOST: 127.0.0.1
      API_PORT: "4000"
      INTERNAL_API_URL: http://127.0.0.1:4000
      PUBLIC_APP_URL: http://localhost:3000
      RESEND_API_URL: https://api.resend.com/emails
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: fosslate
      POSTGRES_USER: fosslate
      POSTGRES_PASSWORD: fosslate
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fosslate -d fosslate"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
